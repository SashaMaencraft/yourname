<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VisualVertex | Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 24px 20px;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 30px 0;
        }

        .btn {
            width: 100%;
            padding: 18px 24px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            transition: transform 0.1s ease;
            font-family: inherit;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-channel {
            background: #26a5e4;
            color: white;
        }

        .btn-max {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .info-text {
            background: var(--tg-theme-secondary-bg-color, '#f4f4f5');
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            line-height: 1.6;
            text-align: center;
            font-size: 15px;
        }

        .footer {
            text-align: center;
            padding: 20px 0 10px;
            border-top: 1px solid var(--tg-theme-hint-color, '#ddd');
            margin-top: auto;
            font-size: 13px;
            color: var(--tg-theme-hint-color, '#8e8e93');
        }

        .author {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="buttons">
        <!-- Кнопка 1: Сайт -->
        <button class="btn" id="siteBtn">🌐 Перейти на сайт</button>
        
        <!-- Кнопка 2: Telegram канал -->
        <button class="btn btn-channel" id="channelBtn">📢 Telegram канал</button>
        
        <!-- Кнопка 3: MAX -->
        <button class="btn btn-max" id="maxBtn">🔥 MAX</button>
    </div>

    <div class="info-text" id="customText">
        🎮 <strong>VisualVertex RP</strong><br>
        Нажми на любую кнопку выше 👆
    </div>

    <div class="footer">
        <div class="author">
            ✍️ <span>Авторский проект VisualVertex</span>
        </div>
    </div>
</div>

<script>
    // Инициализация Telegram Mini App
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // ===== ТВОИ ССЫЛКИ (ПРОВЕРЕНО) =====
    const SITE_URL = "https://visualvertexrp.netlify.app/terminology";
    const CHANNEL_URL = "https://t.me/VisualVertex";
    const MAX_URL = "https://nothere-max.netlify.app/";

    // Универсальная функция открытия ссылок (работает везде)
    function openLink(url, name) {
        if (!url) {
            tg.showPopup({
                title: "Ошибка",
                message: `Ссылка для "${name}" не найдена`,
                buttons: [{type: "ok"}]
            });
            return;
        }
        
        // Пробуем открыть в новой вкладке
        window.open(url, '_blank');
        
        // Показываем уведомление
        tg.showPopup({
            title: "Открытие",
            message: `Открывается ${name}...`,
            buttons: [{type: "ok"}]
        });
    }

    // Кнопка 1: Сайт
    document.getElementById('siteBtn').onclick = function() {
        openLink(SITE_URL, "сайт");
    };

    // Кнопка 2: Telegram канал
    document.getElementById('channelBtn').onclick = function() {
        openLink(CHANNEL_URL, "Telegram канал");
    };

    // Кнопка 3: MAX
    document.getElementById('maxBtn').onclick = function() {
        openLink(MAX_URL, "MAX");
    };

    // Твой текст (можешь заменить)
    document.getElementById('customText').innerHTML = `
        🚀 <strong>VisualVertex Project</strong><br><br>
        📌 Сайт: visualvertexrp.netlify.app<br>
        📢 Канал: @VisualVertex<br>
        🔥 MAX: nothere-max.netlify.app<br><br>
        ✅ Нажми на любую кнопку - ссылка откроется в новой вкладке
    `;
</script>
</body>
</html>
