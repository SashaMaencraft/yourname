<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VisualVertex | Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 24px 20px;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 30px 0;
        }

        .btn {
            width: 100%;
            padding: 18px 24px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            transition: transform 0.1s ease, opacity 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-channel {
            background: var(--tg-theme-secondary-bg-color, '#e9ecef');
            color: var(--tg-theme-text-color, '#000000');
            border: 1px solid var(--tg-theme-hint-color, '#ced4da');
        }

        .btn-max {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .info-text {
            background: var(--tg-theme-secondary-bg-color, '#f4f4f5');
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            line-height: 1.6;
            text-align: center;
            font-size: 15px;
        }

        .footer {
            text-align: center;
            padding: 20px 0 10px;
            border-top: 1px solid var(--tg-theme-hint-color, '#ddd');
            margin-top: auto;
            font-size: 13px;
            color: var(--tg-theme-hint-color, '#8e8e93');
        }

        .author {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge {
            background: #4caf50;
            color: white;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 11px;
            display: inline-block;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Три кнопки -->
    <div class="buttons">
        <button class="btn" id="siteBtn">🌐 Перейти на сайт</button>
        <button class="btn btn-channel" id="channelBtn">📢 Telegram канал</button>
        <button class="btn btn-max" id="maxBtn">🔥 MAX</button>
    </div>

    <!-- Текстовая область (можно заменить на свой текст) -->
    <div class="info-text" id="customText">
        🎮 <strong>VisualVertex RP</strong><br>
        Добро пожаловать! Нажимай на кнопки ниже 👇
    </div>

    <!-- Авторский блок -->
    <div class="footer">
        <div class="author">
            ✍️ <span>Авторский проект VisualVertex</span>
        </div>
        <div class="status-badge">
            🔓 Работает при блокировках РФ
        </div>
    </div>
</div>

<script>
    // Инициализация Telegram Mini App
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand(); // на весь экран

    // ========== ВАШИ ССЫЛКИ ==========
    const SITE_URL = "https://visualvertexrp.netlify.app/terminology";
    const CHANNEL_USERNAME = "VisualVertex";  // имя канала (без @)
    const MAX_URL = "https://nothere-max.netlify.app/";

    // Функция открытия канала с обходом блокировок РФ
    const openChannelWithBypass = () => {
        // Способ 1: открыть через tg:// (напрямую в приложении Telegram)
        try {
            window.location.href = `tg://resolve?domain=${CHANNEL_USERNAME}`;
        } catch(e) {
            console.log("tg:// не сработал, пробуем зеркала");
        }
        
        // Способ 2: через 300мс открываем зеркало в новой вкладке
        setTimeout(() => {
            const mirrors = [
                `https://t.me/${CHANNEL_USERNAME}`,
                `https://tdl.me/${CHANNEL_USERNAME}`,
                `https://t.me/s/${CHANNEL_USERNAME}`
            ];
            window.open(mirrors[0], '_blank');
        }, 300);
    };

    // Функция безопасного перехода по ссылке
    const navigateTo = (url, name) => {
        if (!url || url === "") {
            tg.showPopup({
                title: "Ошибка",
                message: `Ссылка для "${name}" не настроена`,
                buttons: [{ type: "ok" }]
            });
            return;
        }
        
        tg.showPopup({
            title: "Переход",
            message: `Открыть ${name}?`,
            buttons: [
                { type: "cancel", text: "Отмена" },
                { type: "ok", text: "Открыть" }
            ]
        }, (btnId) => {
            if (btnId === "ok") {
                window.location.href = url;
                tg.close();
            }
        });
    };

    // ========== ОБРАБОТЧИКИ КНОПОК ==========
    
    // Кнопка 1: Сайт
    document.getElementById('siteBtn').onclick = () => {
        navigateTo(SITE_URL, "сайт VisualVertex");
    };

    // Кнопка 2: Telegram канал (с обходом блокировок)
    document.getElementById('channelBtn').onclick = () => {
        tg.showPopup({
            title: "Открыть канал",
            message: `Переход в Telegram канал @${CHANNEL_USERNAME}\n(обход блокировок РФ активен)`,
            buttons: [
                { type: "cancel", text: "Отмена" },
                { type: "ok", text: "Перейти" }
            ]
        }, (btnId) => {
            if (btnId === "ok") {
                openChannelWithBypass();
                tg.close();
            }
        });
    };

    // Кнопка 3: MAX
    document.getElementById('maxBtn').onclick = () => {
        navigateTo(MAX_URL, "MAX");
    };

    // ===== ЕСЛИ ХОЧЕШЬ ИЗМЕНИТЬ ТЕКСТ - МЕНЯЙ ЗДЕСЬ =====
    const YOUR_CUSTOM_TEXT = `
        🚀 <strong>Добро пожаловать в VisualVertex!</strong><br><br>
        📌 <strong>Сайт:</strong> Терминология проекта<br>
        📢 <strong>Канал:</strong> @VisualVertex<br>
        🔥 <strong>MAX:</strong> Дополнительный раздел<br><br>
        <span style="font-size:13px;">✅ Все ссылки работают даже при блокировках РФ</span>
    `;
    
    document.getElementById('customText').innerHTML = YOUR_CUSTOM_TEXT;
    
    // Отправка данных в Telegram (для аналитики)
    tg.sendData(JSON.stringify({
        event: "app_started",
        timestamp: Date.now()
    }));
</script>
</body>
</html>
