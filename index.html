<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 24px 20px;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin: 40px 0;
        }

        .btn {
            width: 100%;
            padding: 18px 24px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            transition: transform 0.1s ease;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-channel {
            background: var(--tg-theme-secondary-bg-color, '#e9ecef');
            color: var(--tg-theme-text-color, '#000000');
            border: 1px solid var(--tg-theme-hint-color, '#ced4da');
        }

        .info-text {
            background: var(--tg-theme-secondary-bg-color, '#f4f4f5');
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            line-height: 1.5;
            text-align: center;
        }

        .footer {
            text-align: center;
            padding: 20px 0 10px;
            border-top: 1px solid var(--tg-theme-hint-color, '#ddd');
            margin-top: auto;
            font-size: 13px;
            color: var(--tg-theme-hint-color, '#8e8e93');
        }

        .author {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Кнопки -->
    <div class="buttons">
        <button class="btn" id="siteBtn">🌐 Перейти на сайт</button>
        <button class="btn btn-channel" id="channelBtn">📢 Telegram канал</button>
    </div>

    <!-- Текстовая область (сюда потом вставишь свой текст) -->
    <div class="info-text" id="customText">
        🔹 Здесь будет твой текст<br>
        <strong>Пример:</strong> Привет! Нажми на кнопки выше.
    </div>

    <!-- Авторский блок -->
    <div class="footer">
        <div class="author">
            ✍️ <span>Авторский проект</span>
        </div>
        <div style="font-size: 11px; margin-top: 8px;">
            🔓 Работает даже при блокировках РФ (зеркала Telegram)
        </div>
    </div>
</div>

<script>
    // Инициализация Telegram Mini App
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand(); // на весь экран

    // ===== НАСТРОЙКИ (ЗАМЕНИ НА СВОИ) =====
    const SITE_URL = "https://example.com";        // Ссылка на твой сайт
    const CHANNEL_USERNAME = "durov";              // Имя канала (без @)
    
    // Массив зеркал для обхода блокировок РФ
    const getChannelUrl = () => {
        // Пробуем открыть через tg:// (открывает в самом Telegram)
        window.location.href = `tg://resolve?domain=${CHANNEL_USERNAME}`;
        
        // Через 300мс открываем зеркало в новой вкладке (если tg:// не сработал)
        setTimeout(() => {
            const mirrors = [
                `https://t.me/${CHANNEL_USERNAME}`,
                `https://tdl.me/${CHANNEL_USERNAME}`,
                `https://t.me/s/${CHANNEL_USERNAME}`
            ];
            window.open(mirrors[0], '_blank');
        }, 300);
    };

    // Кнопка 1: Сайт
    document.getElementById('siteBtn').onclick = () => {
        if (SITE_URL && SITE_URL !== "https://example.com") {
            tg.close(); // закрываем мини-приложение
            window.location.href = SITE_URL;
        } else {
            tg.showPopup({
                title: "Настройка",
                message: "Замени SITE_URL на свой сайт в коде",
                buttons: [{ type: "ok" }]
            });
        }
    };

    // Кнопка 2: Канал (с обходом блокировок)
    document.getElementById('channelBtn').onclick = () => {
        tg.showPopup({
            title: "Открыть канал",
            message: `Переход на канал @${CHANNEL_USERNAME}\n(с обходом блокировок РФ)`,
            buttons: [{ type: "ok" }]
        }, () => {
            getChannelUrl();
        });
    };

    // ===== СЮДА ВСТАВИШЬ СВОЙ ТЕКСТ ПОТОМ =====
    // Замени текст внутри кавычек на свой
    const myCustomText = `
        🚀 <strong>Важное сообщение</strong><br><br>
        Твой текст будет здесь. Поддержи проект!
    `;
    document.getElementById('customText').innerHTML = myCustomText;
</script>
</body>
</html>
